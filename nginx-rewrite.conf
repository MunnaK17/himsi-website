# ===============================================================
# Nginx rewrite rules untuk HIMSI Website
#
# CARA PASANG di aaPanel:
#   1. Login aaPanel
#   2. Website -> klik site himsi.local -> Config
#   3. Tab "URL Rewrite" (atau "Rewrite")
#   4. PILIH "Custom"  (BUKAN template laravel/wordpress)
#   5. PASTE seluruh isi file ini ke text area
#   6. Save
#
# ATAU edit langsung file:
#   /www/server/panel/vhost/rewrite/himsi.local.conf
# ===============================================================

# Folder admin: tetap pakai .php internal (skip clean URL)
location /admin/ {
    try_files $uri $uri/ /admin/index.php?$query_string;
}

# Clean URL: /profil -> profil.php (internal rewrite, URL tetap bersih di address bar)
location / {
    try_files $uri $uri/ $uri.php?$query_string /index.php?$query_string;
}
