# ===============================================================
# Nginx rewrite rules untuk HIMSI Website
#
# CARA PASANG di aaPanel:
#   Website -> klik site -> URL Rewrite -> Custom -> paste -> Save
#
# Atau edit langsung file:
#   /www/server/panel/vhost/rewrite/himsi.local.conf
# ===============================================================

# Internal rewrite: /profil -> profil.php
# Hanya rewrite kalau target file .php benar-benar ada.
if (!-e $request_filename) {
    rewrite ^/([^.]+)$ /$1.php last;
}
